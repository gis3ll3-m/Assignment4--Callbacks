<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Rock Paper Scissors</h1>
    </header>


    <!--Player-->
    <section id="player">

        <div class="pchoice">
            <h2>Your Throw</h2>

            <div class="choices">
                <figure data-choice="rock">
                    <img src="images/rock.PNG" alt="Rock">
                </figure>

                <figure data-choice="paper">
                    <img src="images/paper.PNG" alt="Paper">
                </figure>

                <figure data-choice="scissors">
                    <img src="images/scissors.PNG" alt="Scissors">
                </figure>
            </div>
        </div>
    </section>

    <div class="computer">
        <h2>Computer Throw</h2>
        <img id='comp-image' src="images/question-mark.PNG" alt="Question Mark">
    </div>

    <div class="results">
        <h2>Results</h2>
        <p id="result-txt">Make your choice!</p>
    </div>


    <script src="script.js" defer></script>
</body>

</html>
